<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://thymeleaf.org">
<head>
    <!-- Обязательные метатеги -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
    <title>Cinema</title>
</head>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="#">CINEMA</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Переключатель навигации">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:href="@{/index}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link " aria-current="page" th:href="@{/registrationForm}">Регистрация</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <div class="d-flex justify-content-end">
                    <a class="nav-item nav-link active" th:if="${user.name != 'Гость'}" href="$#">
                        <span th:text="${user.name}"></span>
                        <span> | Выйти</span>
                    </a>
                    <a class="nav-item nav-link active" th:if="${user.name == 'Гость'}" href="#">
                        <span th:text="${user.name}"></span>
                        <span> | Войти</span>
                    </a>
                </div>
            </ul>
        </div>
    </div>
</nav>
<body>
<div class="container mt-4">
            <div class="card">
                <div class="card-header">
                    Авторизация
                </div>
                <div th:if="${fail}" class="alert alert-danger" role="alert">
                    Пользователь с такой почтой или паролем не существует
                </div>
                <form class="p-3" th:action="@{/login}" method="post">
                    <input type="hidden" name="id" value="0"/>
                    <div class="mb-3">
                        <label for="email" class="form-label">Адрес электронной почты:</label>
                        <input type="email" class="form-control" name="email" id="email"
                               aria-describedby="emailHelp">

                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль:</label>
                        <input type="password" class="form-control" name="password" id="password">

                    </div>
                    <button type="submit" class="btn btn-primary">Вход</button>
                </form>
            </div>
        </div>
</body>
</html>
